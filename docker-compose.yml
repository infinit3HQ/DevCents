services:
  web:
    image: ${WEB_IMAGE:-ghcr.io/infinit3hq/devcents:latest}
    pull_policy: always
    restart: unless-stopped
    networks:
      - proxy
    environment:
      NODE_ENV: production
      VITE_CONVEX_URL: ${VITE_CONVEX_URL:?VITE_CONVEX_URL is required}
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:?VITE_CLERK_PUBLISHABLE_KEY is required}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?CLERK_SECRET_KEY is required}
      CLERK_ISSUER_URL: ${CLERK_ISSUER_URL:?CLERK_ISSUER_URL is required}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.devcents-web.rule=Host(`${TRAEFIK_WEB_HOST:?TRAEFIK_WEB_HOST is required}`)"
      - "traefik.http.routers.devcents-web.entrypoints=websecure"
      - "traefik.http.routers.devcents-web.tls.certresolver=cloudflare"
      - "traefik.http.services.devcents-web.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"

networks:
  proxy:
    external: true
