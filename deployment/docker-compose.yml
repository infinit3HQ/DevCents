services:
  # The Frontend Application
  devcents-app:
    image: devcents-app:latest
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Inject runtime variables. These defaults connect to the sibling Convex container
      # Users can override these by creating a .env file in the deployment directory.
      - VITE_CONVEX_URL=${VITE_CONVEX_URL:-http://localhost:3210}
      - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_ISSUER_URL=${CLERK_ISSUER_URL}
      - NODE_ENV=production
    depends_on:
      - convex

  # The Convex Backend
  convex:
    image: ghcr.io/get-convex/convex-backend:latest
    ports:
      - "3210:3210"
      - "3211:3211"
    volumes:
      # Mount a persistent volume to survive redeployments/restarts
      - convex-data:/var/lib/convex/storage
    environment:
      - CONVEX_LISTEN_PORT=3210
      - CONVEX_SITE_PORT=3211
      - CLERK_ISSUER_URL=${CLERK_ISSUER_URL}
      # The admin key for full control over the DB
      - INSTANCE_SECRET=${CONVEX_SELF_HOSTED_ADMIN_KEY:-centstack|0140945e8143d1473961c863359f3b33509101fa5deb2e7615065bcb0f4418556937d0f476}
      - INSTANCE_NAME=${INSTANCE_NAME:-devcents}

volumes:
  # This named volume is critical for persisting Convex data
  convex-data:
