name: Deploy to Server One
on:
  workflow_run:
    workflows:
      - Build, Publish and Release
    types:
      - completed

env:
  INSTANCE_NAME: devcents
  WEB_IMAGE: ghcr.io/infinit3hq/devcents:latest
  TRAEFIK_WEB_HOST: devcents.012140.xyz
  TRAEFIK_CONVEX_HOST: devcents-convex.012140.xyz
  VITE_CONVEX_URL: https://devcents-convex.012140.xyz

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on:
      - serverone
      - self-hosted
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare deployment secrets
        env:
          INSTANCE_SECRET: ${{ secrets.INSTANCE_SECRET }}
        run: |
          ADMIN_KEY="${INSTANCE_NAME}|${INSTANCE_SECRET}"
          echo "::add-mask::$ADMIN_KEY"
          {
            printf 'INSTANCE_SECRET=%s\n' "$INSTANCE_SECRET"
            printf 'CONVEX_SELF_HOSTED_ADMIN_KEY=%s\n' "$ADMIN_KEY"
          } >> "$GITHUB_ENV"

      - name: Create required environment files
        run: |
          {
            printf 'CLERK_ISSUER_URL=%s\n' '${{ secrets.CLERK_ISSUER_URL }}'
            printf 'CLERK_SECRET_KEY=%s\n' '${{ secrets.CLERK_SECRET_KEY }}'
            printf 'INSTANCE_SECRET=%s\n' "$INSTANCE_SECRET"
            printf 'INSTANCE_NAME=%s\n' '${{ env.INSTANCE_NAME }}'
            printf 'WEB_IMAGE=%s\n' '${{ env.WEB_IMAGE }}'
            printf 'VITE_CLERK_PUBLISHABLE_KEY=%s\n' '${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}'
            printf 'VITE_CONVEX_URL=%s\n' '${{ env.VITE_CONVEX_URL }}'
            printf 'CONVEX_SELF_HOSTED_ADMIN_KEY=%s\n' "$CONVEX_SELF_HOSTED_ADMIN_KEY"
            printf 'TRAEFIK_WEB_HOST=%s\n' '${{ env.TRAEFIK_WEB_HOST }}'
            printf 'TRAEFIK_CONVEX_HOST=%s\n' '${{ env.TRAEFIK_CONVEX_HOST }}'
          } > .env

      - name: Install dependencies
        run: npm ci

      - name: Pull and start Docker services
        run: |
          docker compose pull
          docker compose up -d --remove-orphans
          docker compose ps
          docker image prune -f
          
      - name: Deploy Convex Functions
        working-directory: apps/web
        env:
          CONVEX_DEPLOY_URL: ${{ env.VITE_CONVEX_URL }}
        run: |
          echo "Waiting for Convex backend to be ready..."
          for i in $(seq 1 24); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$CONVEX_DEPLOY_URL/version" || true)
            if [ "$status" = "200" ]; then
              echo "Convex backend is ready (attempt $i)"
              break
            fi
            echo "Attempt $i: got HTTP $status, retrying in 5s..."
            sleep 5
          done
          if [ "$status" != "200" ]; then
            echo "Convex backend did not become ready after 2 minutes"
            exit 1
          fi
          npx convex deploy --url "$CONVEX_DEPLOY_URL" --admin-key "$CONVEX_SELF_HOSTED_ADMIN_KEY"
