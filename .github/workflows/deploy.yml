name: Deploy to Server One
on:
  workflow_run:
    workflows:
      - Build, Publish and Release
    types:
      - completed

env:
  INSTANCE_NAME: devcents
  WEB_IMAGE: ghcr.io/infinit3hq/devcents:latest
  TRAEFIK_WEB_HOST: devcents.012140.xyz
  TRAEFIK_CONVEX_HOST: devcents-convex.012140.xyz
  VITE_CONVEX_URL: https://devcents-convex.012140.xyz

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on:
      - serverone
      - self-hosted
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create required environment files
        run: |
          cat > .env <<EOF
          CLERK_ISSUER_URL=${{ secrets.CLERK_ISSUER_URL }}
          CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
          INSTANCE_SECRET=${{ secrets.INSTANCE_SECRET }}
          INSTANCE_NAME=${{ env.INSTANCE_NAME }}
          WEB_IMAGE=${{ env.WEB_IMAGE }}
          VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_CONVEX_URL=${{ env.VITE_CONVEX_URL }}
          CONVEX_SELF_HOSTED_ADMIN_KEY=${{ env.INSTANCE_NAME }}|${{ secrets.INSTANCE_SECRET }}
          TRAEFIK_WEB_HOST=${{ env.TRAEFIK_WEB_HOST }}
          TRAEFIK_CONVEX_HOST=${{ env.TRAEFIK_CONVEX_HOST }}
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Pull and start Docker services
        run: |
          docker compose pull
          docker compose up -d --remove-orphans
          docker compose ps
          docker image prune -f
          
      - name: Deploy Convex Functions
        working-directory: apps/web
        env:
          CONVEX_DEPLOY_URL: ${{ env.VITE_CONVEX_URL }}
          CONVEX_DEPLOY_ADMIN_KEY: ${{ env.INSTANCE_NAME }}|${{ secrets.INSTANCE_SECRET }}
        run: |
          sleep 5
          npx convex deploy --url "$CONVEX_DEPLOY_URL" --admin-key "$CONVEX_DEPLOY_ADMIN_KEY"
