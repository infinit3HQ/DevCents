name: Deploy to Server One
on:
  workflow_run:
    workflows:
      - Build, Publish and Release
    types:
      - completed

env:
  WEB_IMAGE: ghcr.io/infinit3hq/devcents:latest
  TRAEFIK_WEB_HOST: devcents.012140.xyz
  VITE_CONVEX_URL: https://devcents-convex.012140.xyz

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on:
      - serverone
      - self-hosted
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create required environment files
        run: |
          {
            printf 'CLERK_ISSUER_URL=%s\n' '${{ secrets.CLERK_ISSUER_URL }}'
            printf 'CLERK_SECRET_KEY=%s\n' '${{ secrets.CLERK_SECRET_KEY }}'
            printf 'WEB_IMAGE=%s\n' '${{ env.WEB_IMAGE }}'
            printf 'VITE_CLERK_PUBLISHABLE_KEY=%s\n' '${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}'
            printf 'VITE_CONVEX_URL=%s\n' '${{ env.VITE_CONVEX_URL }}'
            printf 'TRAEFIK_WEB_HOST=%s\n' '${{ env.TRAEFIK_WEB_HOST }}'
          } > .env

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Deploy Convex Functions
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_SELF_HOSTED_ADMIN_KEY }}
        run: |
          # Strip any accidental newlines or spaces from the secret
          CLEAN_KEY=$(echo -n "$CONVEX_DEPLOY_KEY" | tr -d '\n\r ')
          npx convex deploy --url ${{ env.VITE_CONVEX_URL }} --admin-key "$CLEAN_KEY"
        working-directory: apps/web

      - name: Build and start Docker services
        run: |
          docker compose build --pull
          docker compose up -d --remove-orphans
          docker compose ps
          docker image prune -f
